  <!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My VR Game</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- Score text -->
      <a-entity 
        id="scoreText" 
        text="value: Score: 0; color: black;" 
        position="-0.5 2 -2">
      </a-entity>

      <!-- The cube you tap -->
      <a-box 
        id="cube" 
        position="0 1 -3" 
        color="blue">
      </a-box>

      <!-- Sound effect -->
      <a-entity 
        id="clickSound" 
        sound="src: url(click.mp3);">
      </a-entity>

    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
